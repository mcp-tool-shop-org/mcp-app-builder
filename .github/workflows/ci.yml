name: CI

on:
  push:
    paths:
      - "src/**"
      - "schemas/**"
      - "package.json"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "schemas/**"
      - "package.json"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript (strict)
        run: npm run compile

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests
        run: npm test -- --run
